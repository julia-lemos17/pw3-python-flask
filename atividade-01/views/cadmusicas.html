{%extends 'base.html' %}
{% block content %}

<h2>Cadastro de Músicas</h2>
<hr>

<form action="{{url_for('cadmusicas')}}" method="POST">
    <label>Música</label>
    <input type="text" name="musica" placeholder="Insira o nome da Música." required class="form-control">

     <label>Cantor/Banda</label>
    <input type="text" name="cantor" placeholder="Insira o(a) cantor(a) dessa música." required class="form-control">

     <label>Gênero</label>
    <input type="text" name="genero" placeholder="Insira a gênero da música." required class="form-control">

     <label>Ano</label>
    <input type="text" name="ano" placeholder="Insira a ano em que a música foi lançada." required class="form-control">

    <input type="submit" value="Cadastrar" class="btn btn-success">
    <input type="reset" value="Limpar" class="btn btn-danger">
</form>
<br>
<br>
<h4>Músicas cadastradas</h4>

<table class="table table-bordered table-hover">
    <thead class="table-dark">
        <tr>
            <th>Nome da Música</th>
            <th>Cantor/Banda</th>
            <th>Gênero</th>
            <th>Ano de lançamento</th>
        </tr>
    </thead>
    <tbody>
        <!-- Aqui irá o for -->
         {%for musica in listaMusicas%}
         <tr>
            <td>{{musica.musica}}</td>
            <td>{{musica.cantor}}</td>
            <td>{{musica.genero}}</td>
            <td>{{musica.ano}}</td>
         </tr>
         {%endfor%}
    </tbody>
</table>
{% endblock content %}
