{% extends "base.html" %}

{% block content %}
<!-- Buscando e exibindo as flash messages -->
 {%with messages = get_flashed_messages(with_categories=true) %}

 {% for category, message in messages%}
 <div class="alert alert-{{category}}">
    {{message}}
 </div>
 {% endfor %}
 {% endwith %}
<!-- Página de cadastro -->
 <div class = "container">
    <div class = "card mt-4">
        <div class = "card-header">
            <h3>Cadastro de Usuários</h3>
        </div>
        <div class="card-body">
            <!-- Formulario -->
             <form action="{{url_for('cadastro')}}" method="POST">
                <label>E-mail</label>
                <input type="email" name="email" class="form-control" placeholder="Insira seu e-mail" required>
                <label>Senha</label>
                <input type="password" name="senha" class="form-control" placeholder="Insira sua senha" required>
                <!-- Botao -->
                 <br>
                 <button type="submit" class="btn btn-danger btn-block">Cadastrar</button>
             </form>
        </div>
    </div>
 </div>
 {% endblock %}
